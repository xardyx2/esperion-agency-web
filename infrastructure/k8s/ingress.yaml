apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esperion-ingress
  namespace: esperion
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt"
spec:
  tls:
  - hosts:
    - esperion.agency
    - www.esperion.agency
    secretName: esperion-tls
  rules:
  - host: esperion.agency
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80