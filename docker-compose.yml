services:
  # Frontend - Nuxt 4 development server with Bun
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_BASE_URL=http://localhost:8081/api/v1
      - NUXT_PUBLIC_API_BASE=http://localhost:8081/api/v1
      - NUXT_RECAPTCHA_SITE_KEY=${NUXT_RECAPTCHA_SITE_KEY:-}
      - NUXT_GA4_MEASUREMENT_ID=${NUXT_GA4_MEASUREMENT_ID:-}
      - NUXT_CLARITY_PROJECT_ID=${NUXT_CLARITY_PROJECT_ID:-}
      - NUXT_META_PIXEL_ID=${NUXT_META_PIXEL_ID:-}
      - NUXT_TIKTOK_PIXEL_ID=${NUXT_TIKTOK_PIXEL_ID:-}
      - NUXT_LINKEDIN_PIXEL_ID=${NUXT_LINKEDIN_PIXEL_ID:-}
    depends_on:
      - backend
    networks:
      - esperion-network

  # Backend - Rust + Axum API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      - ./backend:/app
      - /app/target
      - /usr/local/cargo/registry
      - /usr/local/cargo/git
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=database
      - DB_PORT=8000
      - DB_USER=root
      - DB_PASS=root
      - DB_NS=esperion
      - DB_DB=esperion_db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRATION=7d
      - REFRESH_TOKEN_EXPIRATION=30d
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-}
      - ALIBABA_AI_API_KEY=${ALIBABA_AI_API_KEY:-sk-sp-83766abe865e4c14af18ae9a918c7d8b}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - RUST_LOG=debug
    depends_on:
      database:
        condition: service_started
    networks:
      - esperion-network

  # Database - SurrealDB 1.5.x for local development
  database:
    image: surrealdb/surrealdb:v1.5.6
    container_name: esperion-surrealdb
    user: "0:0"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    ports:
      - "8002:8000"
    volumes:
      - surreal-data:/data
    environment:
      - SURREAL_USER=root
      - SURREAL_PASS=root
    command: start --log debug --user root --pass root --bind 0.0.0.0:8000 file:/data/esperion.db
    networks:
      - esperion-network

networks:
  esperion-network:
    driver: bridge

volumes:
  surreal-data:
