services:
  # Frontend - Nuxt 4 development server with Bun
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-nuxt:/app/.nuxt
    ports:
      - "3000:3000"
      - "24678:24678"  # Vite HMR / DevTools
      - "3001:3001"  # Nuxt DevTools alternative
    environment:
      - NODE_ENV=development
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NUXT_DEVTOOLS_HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_BASE_URL=http://localhost:8081/api/v1
      - NUXT_PUBLIC_API_BASE=http://localhost:8081/api/v1
      - NUXT_RECAPTCHA_SITE_KEY=${NUXT_RECAPTCHA_SITE_KEY:-}
      - NUXT_GA4_MEASUREMENT_ID=${NUXT_GA4_MEASUREMENT_ID:-}
      - NUXT_CLARITY_PROJECT_ID=${NUXT_CLARITY_PROJECT_ID:-}
      - NUXT_META_PIXEL_ID=${NUXT_META_PIXEL_ID:-}
      - NUXT_TIKTOK_PIXEL_ID=${NUXT_TIKTOK_PIXEL_ID:-}
      - NUXT_LINKEDIN_PIXEL_ID=${NUXT_LINKEDIN_PIXEL_ID:-}
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - esperion-network

  # Backend - Rust + Axum API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    volumes:
      - ./backend:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=database
      - DB_PORT=8000
      - DB_USER=root
      - DB_PASS=root
      - DB_NS=esperion
      - DB_DB=esperion_db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRATION=7d
      - REFRESH_TOKEN_EXPIRATION=30d
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-}
      - ALIBABA_AI_API_KEY=${ALIBABA_AI_API_KEY:-sk-sp-83766abe865e4c14af18ae9a918c7d8b}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - RUST_LOG=debug
      - CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=clang
      - RUSTFLAGS=-C link-arg=-fuse-ld=lld
    depends_on:
      database:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 60s
    networks:
      - esperion-network

  # Database - SurrealDB 3.0.4 with RocksDB backend
  database:
    image: surrealdb/surrealdb:v3.0.4
    container_name: esperion-surrealdb
    user: "0:0"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    ports:
      - "8002:8000"
    volumes:
      - surreal-data:/data
    environment:
      - SURREAL_USER=root
      - SURREAL_PASS=root
    command: start --log debug --user root --pass root --bind 0.0.0.0:8000 rocksdb:/data/esperion.db
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - esperion-network

networks:
  esperion-network:
    driver: bridge

volumes:
  frontend-node-modules:
  frontend-nuxt:
  surreal-data:
  cargo-cache:
  cargo-git:
  target-cache:
