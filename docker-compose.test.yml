services:
  database:
    image: surrealdb/surrealdb:v3.0.4
    ports:
      - "8002:8000"
    volumes:
      - surreal-test-reset:/data
    environment:
      - SURREAL_USER=root
      - SURREAL_PASS=root
    command: start --log debug --user root --pass root --bind 0.0.0.0:8000 rocksdb:/data/esperion.db

  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=database
      - DB_PORT=8000
      - DB_USER=root
      - DB_PASS=root
      - DB_NS=esperion
      - DB_DB=esperion_db
      - JWT_SECRET=test-secret
    depends_on:
      database:
        condition: service_healthy

  test-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://test-backend:8080
    depends_on:
      test-backend:
        condition: service_healthy

volumes:
  surreal-test-reset:
